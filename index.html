<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChuckJokesVue</title>

  <!-- Bootstrap 5 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">
    <header class="site-header">
      <img
        src="https://assets.chucknorris.host/img/avatar/chuck-norris.png"
        alt="Chuck Norris"
        class="header-avatar"
      />
      <h1>Chuck Norris Jokes</h1>
      <p class="tagline">Roundhouse-kick your day with facts.</p>
    </header>

    <main class="container py-5">
      <div class="row g-4 justify-content-center">
        <chuck-card
          v-for="(joke, index) in chuck"
          :key="index"
          :icon_url="joke.icon_url"
          :value="joke.value"
        ></chuck-card>
      </div>
    </main>

    <footer class="site-footer">
      <p>Powered by <strong>Vue 3</strong> &amp; Bootstrap 5 &mdash; ChuckJokesVue</p>
    </footer>
  </div>

  <!-- Vue 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const { createApp } = Vue;

    // ── chuck-card component (Homework 10) ──────────────────────────────────
    const ChuckCard = {
      props: {
        icon_url: { type: String, required: true },
        value:    { type: String, required: true },
      },
      template: `
        <div class="col-12 col-md-4">
          <div class="card h-100 chuck-card shadow-sm">
            <img :src="icon_url" class="card-img-top chuck-card__img" alt="Chuck Norris" />
            <div class="card-body d-flex align-items-center">
              <p class="card-text mb-0">{{ value }}</p>
            </div>
          </div>
        </div>
      `,
    };

    // ── Root app ─────────────────────────────────────────────────────────────
    createApp({
      components: { ChuckCard },

      data() {
        return {
          chuck: [
            {
              icon_url: "https://assets.chucknorris.host/img/avatar/chuck-norris.png",
              value: "Chuck Norris can skydive into outer space.",
            },
            {
              icon_url: "https://assets.chucknorris.host/img/avatar/chuck-norris.png",
              value: "The chief export of Chuck Norris is pain.",
            },
            {
              icon_url: "https://assets.chucknorris.host/img/avatar/chuck-norris.png",
              value: "Chuck Norris doesn't read books. He stares them down until he gets the information he wants.",
            },
            {
              icon_url: "https://assets.chucknorris.host/img/avatar/chuck-norris.png",
              value: "Time waits for no man. Unless that man is Chuck Norris.",
            },
            {
              icon_url: "https://assets.chucknorris.host/img/avatar/chuck-norris.png",
              value: "If you spell Chuck Norris in Scrabble, you win. Forever.",
            },
          ],
        };
      },
    }).mount("#app");
  </script>

</body>
</html>
